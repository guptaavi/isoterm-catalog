# First-party catalog descriptor — Windows-like chassis preset (Spec 083 FR-039).
#
# The artifact is a REAL, committed isoterm-native chrome-slice TOML under
# catalog/artifacts/chassis-windows-like.toml with a REAL sha256 (recomputed +
