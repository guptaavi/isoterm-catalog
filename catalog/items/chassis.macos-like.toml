# First-party catalog descriptor — macOS-like chassis preset (Spec 083 FR-039).
#
# The artifact is a REAL, committed isoterm-native chrome-slice TOML under
# catalog/artifacts/chassis-macos-like.toml with a REAL sha256 (recomputed +
# verified by `isoterm-catalog-tools build`, FR-005). os/arch are "any"
# because a chassis preset is plain TOML with no native code (FR-015).
# ui_asset_kind is "theme" (the schema's closest kind — the pack IS a theme
# slice); the activator routing discriminates on the `chassis.` id prefix.
id = "chassis.macos-like"
category = "ui_asset"
name = "macOS-like chassis"
description = "Round traffic-light window controls, minimal labels, rounded card. Merges ONLY the chrome slice — terminal colors and fonts stay yours. Control/LED colors follow your palette's status borders (no per-glyph color knob exists)."
install_kind = "download_and_activate"
ui_asset_kind = "theme"

[[versions]]
version = "1.0.0"
# Matches the current core (isoterm 0.1.x). Lint-checked by `validate` (FR-013).
core_compat = ">=0.1.0, <0.2.0"

[[versions.artifacts]]
os = "any"
arch = "any"
# URL reflects the INTENDED first-party hosting (real artifact hosting is
# out-of-scope-v1 — see catalog/README.md). The basename resolves to the
# committed catalog/artifacts/chassis-macos-like.toml, whose sha256 `build`
# recomputes.
url = "https://catalog.isoterm.dev/v1/chassis/chassis-macos-like.toml"
size = 1242
sha256 = "f28012cc0c04d721c81b6284ad25e2cfddda1f8e15daa488a4c87160489421b7"
