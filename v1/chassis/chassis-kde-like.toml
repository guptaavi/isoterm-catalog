# chassis.kde-like — first-party chassis preset pack (Spec 083 FR-039).
#
# An isoterm-native theme.toml SUBSET carrying ONLY chrome fields; the
# ChassisActivator merges exactly this chrome slice (merge_chrome_slice) so
# terminal colors, ANSI palette, and fonts always stay the user's (FR-035).
#
# KDE/Breeze-like: "– ▢ ✕"-style controls, subtitle bound to the cwd
# provider, gently rounded card. Approximations within existing knobs: the
# chassis has no minimize slot (maximize/restore/close only) so the "–" of
# Breeze's triple is dropped, and control/LED colors follow the active
# palette's status borders (COLOR slice) rather than this pack.

chrome_mode = "skeuomorphic"

[chassis]
subtitle     = "cwd"
footer_left  = "duration"
footer_right = "bytes_streamed"

[icons]
maximize      = "▢"
restore       = "❐"
close         = "✕"
badge_running = ">_"
badge_success = "OK"
badge_failed  = "!!"

[block]
card_style       = "skeuomorphic"
corner_radius_px = 6.0
border_width_px  = 1.0

[typography.chassis]
size_pt = 12.0
